<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmarTrack Bio Pro - Expert Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            /* Couleurs des réseaux */
            --fb: #1877F2; --wa: #25D366; --ig: #E4405F; 
            --tk: #000000; --li: #0A66C2; --sc: #FFFC00;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; text-align: center; }

        /* --- DESIGN PUBLIC --- */
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .bio-name { font-size: 1.8rem; margin: 0; font-weight: 800; }
        .bio-desc { color: var(--text-sub); font-size: 1rem; margin-bottom: 35px; }

        .links-list { display: grid; gap: 12px; }
        .btn-link { 
            display: flex; align-items: center; padding: 14px 20px; 
            background: var(--card-bg); border-radius: 14px;
            text-decoration: none; color: white; font-weight: 600;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-link:hover { transform: translateY(-3px); background: #2d3a4f; border-color: var(--accent); }
        .btn-link i { width: 30px; font-size: 1.4rem; margin-right: 10px; text-align: center; }

        /* --- PANEL ADMIN --- */
        .admin-section { display: none; background: white; color: #1e293b; border-radius: 20px; padding: 25px; margin-top: 30px; text-align: left; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; }
        
        .btn-save { background: #0ea5e9; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-admin-toggle { margin-top: 50px; background: rgba(255,255,255,0.05); border: none; color: var(--text-sub); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .btn-admin-toggle:hover { color: white; background: rgba(255,255,255,0.1); }

        .link-edit-row { display: grid; grid-template-columns: 1fr 2fr; gap: 5px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div id="public-view">
        <img id="view-img" src="" class="profile-img">
        <h1 id="view-name" class="bio-name"></h1>
        <p id="view-desc" class="bio-desc"></p>

        <div id="links-container" class="links-list"></div>
    </div>

    <button class="btn-admin-toggle" onclick="accessAdmin()"><i class="fa-solid fa-user-shield"></i> Administration</button>

    <div id="admin-panel" class="admin-section">
        <h2 style="margin-top:0"><i class="fa-solid fa-sliders"></i> Personnalisation</h2>
        
        <div class="form-group">
            <label>Nom</label>
            <input type="text" id="input-name">
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="input-desc">
        </div>
        <div class="form-group">
            <label>Lien Photo (URL)</label>
            <input type="text" id="input-img">
        </div>

        <hr style="margin: 20px 0; opacity: 0.2;">
        <label>Configuration des liens</label>
        <div id="admin-links-editor"></div>

        <h3 style="font-size: 1rem; margin-top: 20px;">Analyse d'audience</h3>
        <canvas id="statsChart" height="150"></canvas>

        <button class="btn-save" onclick="saveData()">Mettre à jour mon profil</button>
        <button class="btn-save" style="background:#94a3b8; margin-top:8px;" onclick="closeAdmin()">Annuler</button>
    </div>
</div>

    <script>
    // --- VOS LIENS PERSONNALISÉS (HARDCODÉS) ---
    const SOCIAL_PRESETS = [
        { id: 'wa', title: 'WhatsApp', icon: 'fa-whatsapp', color: '#25D366', url: 'https://wa.me/243837414811' },
        { id: 'sc', title: 'Snapchat', icon: 'fa-snapchat', color: '#FFFC00', url: 'https://www.snapchat.com/add/henockk3458?share_id=mtuemEJhyIA&locale=fr-FR' },
        { id: 'ig', title: 'Instagram', icon: 'fa-instagram', color: '#E4405F', url: 'https://www.instagram.com/henockkalambay869?igsh=MWRrcGhicGlwc3dyZA==' },
        { id: 'tg', title: 'Telegram', icon: 'fa-telegram', color: '#0088cc', url: 'https://t.me/HenockKalambay' },
        { id: 'tk', title: 'TikTok', icon: 'fa-tiktok', color: '#000000', url: 'https://www.tiktok.com/@hentech.studio?_r=1&_t=ZS-951dZFf9lyR' },
        { id: 'em', title: 'Email', icon: 'fa-envelope', color: '#64748b', url: 'mailto:henockkalambay869@gmail.com' }
    ];

    const defaultData = {
        name: "Henock Kalambay",
        desc: "Expert Digital | Hentech Studio",
        img: "profil.jpg", // Remplacez par votre photo
        links: SOCIAL_PRESETS.map(p => ({ ...p, clicks: 0 }))
    };

    // Chargement de la config avec priorité aux liens fixes du code
    let savedStats = JSON.parse(localStorage.getItem('myBioConfigPro')) || { links: [] };
    
    let config = {
        ...defaultData,
        links: SOCIAL_PRESETS.map(preset => {
            // On récupère les clics sauvegardés si ils existent
            const savedLink = (savedStats.links || []).find(l => l.id === preset.id);
            return { ...preset, clicks: savedLink ? savedLink.clicks : 0 };
        })
    };

    function render() {
        document.getElementById('view-name').innerText = config.name;
        document.getElementById('view-desc').innerText = config.desc;
        document.getElementById('view-img').src = config.img;

        const container = document.getElementById('links-container');
        // Affichage des liens (On filtre ceux qui auraient une URL vide par sécurité)
        container.innerHTML = config.links
            .filter(l => l.url !== "")
            .map((link, index) => `
                <a href="${link.url}" target="_blank" class="btn-link" onclick="countClick(${index})">
                    <i class="fa-brands ${link.icon} fa-solid" style="color:${link.color}"></i>
                    <span>${link.title}</span>
                </a>`).join('');

        // Préparation de l'éditeur admin (toujours utile pour le nom/desc/photo)
        document.getElementById('input-name').value = config.name;
        document.getElementById('input-desc').value = config.desc;
        document.getElementById('input-img').value = config.img;
        
        const editor = document.getElementById('admin-links-editor');
        editor.innerHTML = `<p style="font-size:0.8rem; color:#64748b;">Les liens sont désormais gérés directement dans le code source pour plus de sécurité.</p>`;
    }

    function countClick(index) {
        config.links[index].clicks++;
        localStorage.setItem('myBioConfigPro', JSON.stringify(config));
    }

    function accessAdmin() {
        const pin = prompt("Code secret (Défaut: 0000) :");
        if(pin === "2007") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('public-view').style.display = 'none';
            initChart();
        }
    }

    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('public-view').style.display = 'block';
    }

    function saveData() {
        config.name = document.getElementById('input-name').value;
        config.desc = document.getElementById('input-desc').value;
        config.img = document.getElementById('input-img').value;
        localStorage.setItem('myBioConfigPro', JSON.stringify(config));
        render();
        closeAdmin();
    }

    let chartInstance = null;
    function initChart() {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: config.links.map(l => l.title),
                datasets: [{
                    label: 'Clics',
                    data: config.links.map(l => l.clicks),
                    backgroundColor: config.links.map(l => l.color)
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    render();
</script>

    
</body>
</html>
